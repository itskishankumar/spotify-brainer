<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      padding: 20px;
      background: #121212;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }
    .header svg {
      width: 28px;
      height: 28px;
      fill: #1DB954;
    }
    .header h1 {
      font-size: 18px;
      font-weight: 700;
    }
    .status {
      background: #282828;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
      font-size: 13px;
      color: #b3b3b3;
    }
    .status-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-right: 8px;
    }
    .status-dot.active { background: #1DB954; }
    .status-dot.inactive { background: #535353; }
    .actions {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    button {
      background: #282828;
      border: 1px solid #535353;
      color: #fff;
      padding: 10px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      font-family: inherit;
      text-align: left;
      transition: all 0.15s;
    }
    button:hover {
      background: #333;
      border-color: #1DB954;
    }
    .version {
      margin-top: 16px;
      text-align: center;
      font-size: 11px;
      color: #535353;
    }
  </style>
</head>
<body>
  <div class="header">
    <svg viewBox="0 0 24 24"><path d="M12 2C8.5 2 5.5 4.5 5 7.5c-1 .5-2 1.5-2 3 0 1 .5 2 1.5 2.5-.5 1-.5 2 0 3 .5 1 1.5 1.5 2.5 2 0 2 1.5 4 4 4h2c2.5 0 4-2 4-4 1-.5 2-1 2.5-2 .5-1 .5-2 0-3 1-.5 1.5-1.5 1.5-2.5 0-1.5-1-2.5-2-3C18.5 4.5 15.5 2 12 2z"/></svg>
    <h1>Spotify Brainer</h1>
  </div>

  <div class="status" id="status">
    <span class="status-dot inactive" id="status-dot"></span>
    <span id="status-text">Open Spotify Web Player to start</span>
  </div>

  <div class="actions">
    <button id="open-spotify">Open Spotify Web Player</button>
    <button id="toggle-sidebar">Toggle Sidebar (Cmd+Shift+B)</button>
  </div>

  <div class="version">v0.1.0</div>

  <script src="popup.js"></script>
</body>
</html>
